                      error_code: "PROCESSING_FAILED"
  messageTraits:
    Correlation:
      correlationId:
        location: $message.payload#/session/trace_id
        description: Trace ID generated per request and echoed by responses.
  schemas:
    Payload:
      type: object
      required:
        - request
      properties:
        session:
          type: object
          properties:
            session_id:
              type: string
              description: Unique session identifier
            trace_id:
              type: string
              description: Unique identifier for request tracing
            channel:
              type: object
            interface:
              type: object
            network:
              type: object
        request:
          type: object
          properties:
            request_id:
              type: string
            attributes:
              type: object
            connections:
              type: object
            context:
              type: object
            reference:
              type: object
            resources:
              type: object
            scope:
              type: object
            settings:
              type: object
            cursor:
              type: object
            a2a:
              type: array
              items:
                type: object
    SuperpowerResponse:
      type: object
      required:
        - action
        - actionType
        - state
        - message
      properties:
        action:
          type: string
          enum: [superpower]
        actionType:
          type: string
          description: Type of superpower (e.g., adjust_suggestion, sentiment_analysis, risk_assessment)
        state:
          type: string
          enum: [completed, processing, error]
        message:
          type: object
          required:
            - results
          properties:
            results:
              type: array
              items:
                type: object
                properties:
                  response:
                    type: array
                    items:
                      type: object
                      description: Response content varies by superpower type
    ErrorResponse:
      type: object
      required:
        - action
        - actionType
        - state
        - message
      properties:
        action:
          type: string
          enum: [superpower]
        actionType:
          type: string
          description: Type of operation that failed
        state:
          type: string
          enum: [error]
        message:
          type: object
          required:
            - results
          properties:
            results:
              type: array
              items:
                type: object
                properties:
                  response:
                    type: array
                    items:
                      type: object
                      properties:
                        content:
                          type: string
                        error_code:
                          type: string
                      required:
                        - content