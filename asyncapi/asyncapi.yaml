asyncapi: 3.0.0
info:
  title: Optave Client WebSocket API
  version: 3.1.1
  description: |
    AsyncAPI specification for the Optave API.
    This API enables integration with Optave's AI systems for customer interactions,
    content translation, summarization, recommendations, and insights generation.
    The WebSocket connection handles bidirectional communication between clients
    and Optave's orchestrator service for real-time AI-powered operations.
defaultContentType: application/json
servers:
  production:
    host: '{websocketUrl}'
    protocol: wss
    description: Production WebSocket server
    variables: 
      websocketUrl:
        description: WebSocket server URL
        default: '{websocketUrl}'
    security:
      - $ref: "#/components/securitySchemes/oauth2"
  development:
    host: '{websocketUrl}'
    protocol: wss
    description: Development WebSocket server
    variables: 
      websocketUrl:
        description: WebSocket server URL
        default: '{websocketUrl}'
    security:
      - $ref: "#/components/securitySchemes/oauth2"
channels:
  main:
    address: main
    messages:
      publishAdjust.message:
        $ref: '#/components/messages/AdjustMessage'
      publishCustomerInteraction.message:
        $ref: '#/components/messages/CustomerInteractionMessage'
      publishElevate.message:
        $ref: '#/components/messages/ElevateMessage'
      publishInsights.message:
        $ref: '#/components/messages/InsightsMessage'
      publishRecommend.message:
        $ref: '#/components/messages/RecommendMessage'
      publishSummarize.message:
        $ref: '#/components/messages/SummarizeMessage'
      publishTranslate.message:
        $ref: '#/components/messages/TranslateMessage'
      superpowerResponse.message:
        $ref: '#/components/messages/SuperpowerResponseMessage'
      errorResponse.message:
        $ref: '#/components/messages/ErrorResponseMessage'
    description: >-
      Single WebSocket channel (all actions multiplexed via request.request_id +
      attributes.action)
operations:
  publishAdjust:
    action: receive
    channel:
      $ref: '#/channels/main'
    summary: Client sends an adjust action request
    tags:
      - name: adjust
    messages:
      - $ref: '#/channels/main/messages/publishAdjust.message'
  publishCustomerInteraction:
    action: receive
    channel:
      $ref: '#/channels/main'
    summary: Client sends a customer interaction action request
    tags:
      - name: customerinteraction
    messages:
      - $ref: '#/channels/main/messages/publishCustomerInteraction.message'
  publishElevate:
    action: receive
    channel:
      $ref: '#/channels/main'
    summary: Client sends an elevate action request
    tags:
      - name: elevate
    messages:
      - $ref: '#/channels/main/messages/publishElevate.message'
  publishInsights:
    action: receive
    channel:
      $ref: '#/channels/main'
    summary: Client sends an insights action request
    tags:
      - name: insights
    messages:
      - $ref: '#/channels/main/messages/publishInsights.message'
  publishRecommend:
    action: receive
    channel:
      $ref: '#/channels/main'
    summary: Client sends a recommend action request
    tags:
      - name: recommend
    messages:
      - $ref: '#/channels/main/messages/publishRecommend.message'
  publishSummarize:
    action: receive
    channel:
      $ref: '#/channels/main'
    summary: Client sends a summarize action request
    tags:
      - name: summarize
    messages:
      - $ref: '#/channels/main/messages/publishSummarize.message'
  publishTranslate:
    action: receive
    channel:
      $ref: '#/channels/main'
    summary: Client sends a translate action request
    tags:
      - name: translate
    messages:
      - $ref: '#/channels/main/messages/publishTranslate.message'
  superpowerResponse:
    action: send
    channel:
      $ref: '#/channels/main'
    summary: Server sends superpower response back to client
    tags:
      - name: response
    messages:
      - $ref: '#/channels/main/messages/superpowerResponse.message'
  errorResponse:
    action: send
    channel:
      $ref: '#/channels/main'
    summary: Server sends error response back to client
    tags:
      - name: error
    messages:
      - $ref: '#/channels/main/messages/errorResponse.message'

components:
  securitySchemes:
    oauth2:
      type: oauth2
      description: OAuth2 client credentials flow for authentication
      flows:
        clientCredentials:
          tokenUrl: https://incubator.oco.optave.tech/auth/oauth2/token/
          availableScopes:
            client: "Client access scope for Optave API operations"
  messages:
    AdjustMessage:
      name: AdjustMessage
      title: Adjust Action Request
      summary: Client request initiating an adjust action.
      contentType: application/json
      traits:
        - $ref: '#/components/messageTraits/Correlation'
      payload:
        $ref: '#/components/schemas/Payload'
      examples:
        - name: basic
          summary: Complete adjust payload example
          payload:
            session:
              session_id: "79012345-6789-0123-456789abcdef"
              channel:
                browser: "Safari 17.0"
                device_info: "iOS/18.2, iPhone15,3"
                device_type: "mobile"
                language: "en-US"
                location: "40.7128,-74.0060"
                medium: "chat"
                section: "support_chat"
              interface:
                app_version: "2.1.0"
                category: "crm"
                language: "en-US"
                name: "support_dashboard"
                type: "custom_components"
              network:
                latency_ms: 95
            request:
              request_id: "89012345-6789-0123-456789abcdef"
              attributes:
                content: "Of course! I'd be happy to help you with anything you need."
                instruction: "Make it very friendly and funny"
                variant: "A"
              connections:
                parent_id: "9e8d7c6b-5a4f-3e2d-1c0b-0987654321ab"
